apiVersion: apps/v1
kind: Deployment
metadata:
  name: template-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: template-service
  template:
    metadata:
      labels:
        app: template-service
    spec:
      containers:
        - name: template-service
          image: gcr.io/$support-it-nest-463304/template-service
          ports:
            - containerPort: 3000
          env:
            - name: OTEL_SERVICE_NAME
              value: "template-service"